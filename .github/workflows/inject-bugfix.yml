name: Inject Bugfix

on:
  workflow_dispatch:

jobs:
  inject-bugfix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Patch HTML
        run: python3 fix.py
      - name: Commit
        run: |
          git config user.name "bot"
          git config user.email "bot@darmona.nl"
          git add -A
          git diff --cached --quiet || git commit -m "Bugfix alle HTML paginas"
          git push

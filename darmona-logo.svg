<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
    <!-- Cream background circle -->
    <circle cx="256" cy="256" r="250" fill="#FBF7F1"/>
    
    <!-- Main border - terracotta -->
    <circle cx="256" cy="256" r="243" fill="none" stroke="#9B4A2E" stroke-width="4"/>
    
    <!-- Inner decorative circle - subtle gold -->
    <circle cx="256" cy="256" r="230" fill="none" stroke="#B8935A" stroke-width="1.5" opacity="0.3"/>
    
    <!-- DM text - perfectly centered -->
    <text x="256" y="280" 
          font-family="Cormorant Garamond, serif" 
          font-size="166" 
          font-weight="400"
          text-anchor="middle" 
          fill="#9B4A2E"
          letter-spacing="3">DM</text>
    
    <!-- Subtitle - subtle gold -->
    <text x="256" y="345" 
          font-family="Cormorant Garamond, serif" 
          font-size="20" 
          text-anchor="middle" 
          fill="#B8935A"
          letter-spacing="2.5"
          opacity="0.7">Culturele Verbinders</text>
</svg>
